name: Build LoongArch64 Bundles

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout (defaults to caller's ref)
        required: false
        type: string
        default: ""
  workflow_dispatch:

jobs:
  build-loongarch64:
    name: Build on LoongArch64 (龙芯)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Strip non-LoongArch makers from forge.config.ts
        run: |
          python3 << 'PYEOF'
          import re
          with open("forge.config.ts", "r") as f:
              content = f.read()

          # Remove import lines for unwanted makers
          content = re.sub(r'\nimport \{ MakerSquirrel \}.*\n', '\n', content)
          content = re.sub(r'\nimport \{ MakerRpm \}.*\n', '\n', content)
          content = re.sub(r'\nimport \{ MakerFlatpak \}.*\n', '\n', content)
          content = re.sub(r'\nimport \{ MakerAppImage \}.*\n', '\n', content)
          content = re.sub(r'\nimport \{ MakerZIP \}.*\n', '\n', content)

          # Add back only the imports we need
          needle = 'import { MakerDeb } from "@electron-forge/maker-deb";'
          insert = 'import { MakerZIP } from "@electron-forge/maker-zip";'
          content = content.replace(needle, needle + "\n" + insert)

          # Replace the makers array — keep only MakerDeb + MakerZIP(linux)
          new_makers = """  makers: [
              new MakerDeb({
                options: options.deb,
              }),
              new MakerZIP({}, ["linux"]),
            ],"""
          content = re.sub(
              r"  makers: \[.*?\n  \],",
              new_makers,
              content,
              flags=re.DOTALL,
          )

          with open("forge.config.ts", "w") as f:
              f.write(content)
          print("forge.config.ts updated — makers: deb, zip")
          PYEOF

      - name: Set up QEMU for LoongArch64
        run: |
          docker run --rm --privileged tonistiigi/binfmt:master --install all

      - name: Build inside LoongArch64 container
        run: |
          docker run --rm --platform linux/loong64 \
            --user root \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ runner.temp }}/cargo-registry:/root/.cargo/registry \
            -v ${{ runner.temp }}/pnpm-store:/root/.local/share/pnpm \
            -v ${{ runner.temp }}/electron-cache:/root/.cache/electron \
            -w /workspace \
            linuxdeepin/deepin:crimson-loong64 \
            bash -c '
              set -euo pipefail

              echo "::group::Install system dependencies"
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y
              apt-get install -y --no-install-recommends \
                ca-certificates curl git xz-utils \
                build-essential pkg-config \
                libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
                librsvg2-dev libavformat-dev libavcodec-dev \
                libavutil-dev libsoup-3.0-dev \
                patchelf desktop-file-utils file fakeroot dpkg-dev \
                zstd
              echo "::endgroup::"

              echo "::group::Install Node.js (LoongArch)"
              NODE_URL="https://unofficial-builds.nodejs.org/download/release/v26.3.1/node-v26.3.1-linux-loong64.tar.xz"
              curl -fsSLo /tmp/node.tar.xz "${NODE_URL}"
              tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
              node --version
              npm --version
              echo "::endgroup::"

              echo "::group::Install pnpm"
              npm install -g pnpm@11
              pnpm --version
              echo "::endgroup::"

              echo "::group::Install Rust"
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              . /root/.cargo/env
              rustup target add wasm32-unknown-unknown
              rustc --version
              cargo --version
              echo "::endgroup::"

              echo "::group::Install wasm-bindgen-cli"
              version=$(awk "/^wasm-bindgen =/ { gsub(/\"/, \"\", \$3); print \$3; exit }" Cargo.toml)
              cargo install "wasm-bindgen-cli@${version}"
              echo "::endgroup::"

              echo "::group::Configure LoongArch Electron"
              LOONG_ELECTRON_VERSION="42.3.0"
              sed -i "s/\"electron\": *\"[^\"]*\"/\"electron\": \"${LOONG_ELECTRON_VERSION}\"/" package.json
              export ELECTRON_MIRROR="https://github.com/darkyzhou/electron-loong64/releases/download/"
              export ELECTRON_CUSTOM_DIR="v${LOONG_ELECTRON_VERSION}"
              echo "Electron pinned to ${LOONG_ELECTRON_VERSION}"
              echo "::endgroup::"

              echo "::group::Install dependencies"
              pnpm install --no-frozen-lockfile
              echo "::endgroup::"

              echo "::group::Build native modules"
              pnpm build:modules
              echo "::endgroup::"

              echo "::group::Build application bundles (deb + zip)"
              pnpm make
              echo "::endgroup::"
            '

      - name: Upload deb
        uses: actions/upload-artifact@v7
        with:
          name: deb-loongarch64
          path: out/make/deb/**
          if-no-files-found: ignore

      - name: Upload zip
        uses: actions/upload-artifact@v7
        with:
          name: zip-loongarch64
          path: out/make/zip/**
          if-no-files-found: ignore
